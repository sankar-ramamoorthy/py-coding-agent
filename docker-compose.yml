# docker-compose.yml

services:
  py-coding-agent:
    build: .
    image: py-coding-agent
    stdin_open: true   # docker run -i
    tty: true          # docker run -t
    volumes:
      - ./workspace:/workspace
      - ./dynamic_tools:/app/dynamic_tools
    environment:
      - LLM_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=lfm2.5-thinking:latest