# docker-compose.yml

services:
  py-coding-agent:
    build: .
    image: py-coding-agent
    stdin_open: true
    tty: true
    volumes:
      - ./workspace:/workspace
      - ./dynamic_tools:/app/dynamic_tools
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-lfm2.5-thinking:latest}
      - LITELLM_MODEL=${LITELLM_MODEL:-groq/qwen/qwen3-32b}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DATETIME_MCP_URL=http://datetime-mcp:50051/mcp
    depends_on:
      - datetime-mcp
    networks:
      - agent_network

  datetime-mcp:
    build: ./mcp_servers/datetime
    ports:
      - "50051:50051"
    restart: unless-stopped
    networks:
      - agent_network

networks:
  agent_network: